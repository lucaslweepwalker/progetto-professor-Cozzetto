<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Orbitron', sans-serif; }

        .accent-border { border: 1px solid #c0392b; }

        .btn-primary {
            background-color: #1c1c1c;
            border: 1px solid #c0392b;
            color: white;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #c0392b22;
            border-color: #e74c3c;
        }

        .btn-secondary {
            background-color: #1c1c1c;
            border: 1px solid #3a3a3a;
            color: #aaaaaa;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .btn-secondary:hover {
            border-color: #c0392b;
            color: white;
        }

        .nav-link {
            color: #aaaaaa;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #e74c3c; }

        select option { background-color: #1c1c1c; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: #111111; color: #f0f0f0;">

    <!-- Navbar -->
    <nav style="background-color: #1a1a1a; border-bottom: 1px solid #c0392b;" class="px-8 py-4 flex items-center justify-between">
        <span class="text-lg font-black tracking-widest uppercase" style="color: #f0f0f0;">F1 Stats</span>
        <div class="flex gap-8">
            <a href="drivers.html" class="nav-link uppercase">Drivers</a>
            <a href="constructors.html" class="nav-link uppercase">Constructors</a>
            <a href="races.html" class="nav-link uppercase">Races</a>
        </div>
    </nav>

    <!-- Hero -->
    <main class="flex flex-col items-center justify-center flex-1 px-4 py-20 text-center">

        <p class="text-xs uppercase tracking-widest mb-3" style="color: #c0392b;">Formula 1 Statistics</p>
        <h1 class="text-4xl font-black uppercase tracking-widest mb-4" style="color: #f0f0f0;">
            Every Race.<br/>Every Driver.<br/>Every Season.
        </h1>
        <p class="text-sm mb-12" style="color: #777777; max-width: 400px;">
            Explore championship standings, constructor battles and race results from the history of F1.
        </p>

        <!-- Card -->
        <div class="rounded-xl p-8 w-full max-w-md accent-border" style="background-color: #1a1a1a;">
            <label class="block text-xs font-semibold uppercase tracking-widest mb-3" style="color: #777777;">
                Select a Season
            </label>
            <select
                id="yearSelect"
                class="w-full rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-red-700 mb-6 accent-border"
                style="background-color: #111111; color: #f0f0f0;"
            >
                <option value="">Loading seasons...</option>
            </select>

            <div class="flex flex-col gap-3">
                <button onclick="goTo('drivers.html')" class="btn-primary rounded-lg py-3 text-sm font-bold uppercase tracking-widest">
                    Driver Standings
                </button>
                <button onclick="goTo('constructors.html')" class="btn-secondary rounded-lg py-3 text-sm font-semibold uppercase tracking-widest">
                    Constructor Standings
                </button>
                <button onclick="goTo('races.html')" class="btn-secondary rounded-lg py-3 text-sm font-semibold uppercase tracking-widest">
                    Race Results
                </button>
            </div>
        </div>

        <p id="error" class="text-red-500 mt-6 text-xs hidden"></p>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs" style="color: #444444; border-top: 1px solid #222222;">
        Data provided by Jolpica · F1 Stats Project
    </footer>

    <script src="api.js"></script>
    <script>
        const yearSelect = document.getElementById("yearSelect");
        const errorEl = document.getElementById("error");

        async function loadSeasons() {
            try {
                const seasons = await getSeasons();
                yearSelect.innerHTML = seasons
                    .map(y => `<option value="${y}">${y}</option>`)
                    .join("");
            } catch (err) {
                errorEl.textContent = "Could not load seasons: " + err.message;
                errorEl.classList.remove("hidden");
            }
        }

        function goTo(page) {
            const year = yearSelect.value;
            if (!year) return;
            sessionStorage.setItem("selectedYear", year);
            window.location.href = page;
        }

        loadSeasons();
    </script>
</body>
</html>
