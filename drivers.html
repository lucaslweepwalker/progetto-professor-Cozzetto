<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Stats · Drivers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Orbitron', sans-serif; }
        .nav-link { color: #aaaaaa; letter-spacing: 0.1em; font-size: 0.75rem; transition: color 0.2s; }
        .nav-link:hover { color: #e74c3c; }
        .nav-link.active { color: #e74c3c; }
        .table-row { border-bottom: 1px solid #2a2a2a; transition: background-color 0.15s; cursor: pointer; }
        .table-row:hover { background-color: #1f1f1f; }
        .position-badge { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
        .year-select { background-color: #111111; border: 1px solid #c0392b; color: #f0f0f0; border-radius: 0.5rem; padding: 0.4rem 0.8rem; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; }
        .year-select:focus { outline: none; }
        select option { background-color: #1c1c1c; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: #111111; color: #f0f0f0;">

    <nav style="background-color: #1a1a1a; border-bottom: 1px solid #c0392b;" class="px-8 py-4 flex items-center justify-between">
        <a href="index.html" class="text-lg font-black tracking-widest uppercase" style="color: #f0f0f0;">F1 Stats</a>
        <div class="flex gap-8">
            <a href="drivers.html" class="nav-link active uppercase">Drivers</a>
            <a href="constructors.html" class="nav-link uppercase">Constructors</a>
            <a href="races.html" class="nav-link uppercase">Races</a>
        </div>
    </nav>

    <div class="px-8 py-8" style="border-bottom: 1px solid #222222;">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <p class="text-xs uppercase tracking-widest mb-1" style="color: #c0392b;">Championship</p>
                <h1 class="text-2xl font-black uppercase tracking-widest">Driver Standings</h1>
            </div>
            <select id="yearSelect" class="year-select"></select>
        </div>
    </div>

    <main class="flex-1 px-8 py-8">
        <div class="max-w-5xl mx-auto">
            <p id="loading" class="text-sm text-center py-16" style="color: #555555;">Loading standings...</p>
            <p id="error" class="text-red-500 text-xs text-center py-8 hidden"></p>
            <div id="tableContainer" class="hidden rounded-xl overflow-hidden" style="border: 1px solid #2a2a2a;">
                <table class="w-full text-sm">
                    <thead>
                        <tr style="background-color: #1a1a1a; border-bottom: 1px solid #c0392b;">
                            <th class="px-6 py-4 text-left text-xs uppercase tracking-widest" style="color: #777777;">Pos</th>
                            <th class="px-6 py-4 text-left text-xs uppercase tracking-widest" style="color: #777777;">Driver</th>
                            <th class="px-6 py-4 text-left text-xs uppercase tracking-widest" style="color: #777777;">Constructor</th>
                            <th class="px-6 py-4 text-left text-xs uppercase tracking-widest" style="color: #777777;">Wins</th>
                            <th class="px-6 py-4 text-right text-xs uppercase tracking-widest" style="color: #777777;">Points</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs" style="color: #444444; border-top: 1px solid #222222;">
        Data provided by Jolpica · F1 Stats Project
    </footer>

    <script src="api.js"></script>
    <script>
        const yearSelect = document.getElementById("yearSelect");
        const tableBody = document.getElementById("tableBody");
        const tableContainer = document.getElementById("tableContainer");
        const loadingEl = document.getElementById("loading");
        const errorEl = document.getElementById("error");

        function badgeStyle(pos) {
            if (pos === 1) return "background-color: #f1c40f; color: #111111;";
            if (pos === 2) return "background-color: #bdc3c7; color: #111111;";
            if (pos === 3) return "background-color: #cd7f32; color: #111111;";
            return "background-color: #2a2a2a; color: #aaaaaa;";
        }

        function renderStandings(standings) {
            tableBody.innerHTML = standings.map(s => `
                <tr class="table-row" onclick="goToDriver('${s.driver.driver_id}')">
                    <td class="px-6 py-4">
                        <div class="position-badge" style="${badgeStyle(s.position)}">${s.position}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold" style="color: #f0f0f0;">
                            ${s.driver.first_name} <span style="color: #e74c3c;">${s.driver.last_name.toUpperCase()}</span>
                        </div>
                        <div class="text-xs mt-0.5" style="color: #555555;">${s.driver.code ?? ""} · ${s.driver.nationality}</div>
                    </td>
                    <td class="px-6 py-4 text-xs" style="color: #aaaaaa;">${s.constructor_name}</td>
                    <td class="px-6 py-4 text-xs" style="color: #aaaaaa;">${s.wins}</td>
                    <td class="px-6 py-4 text-right font-bold" style="color: #f0f0f0;">${s.points}</td>
                </tr>
            `).join("");
            loadingEl.classList.add("hidden");
            tableContainer.classList.remove("hidden");
        }

        async function loadStandings(year) {
            loadingEl.classList.remove("hidden");
            tableContainer.classList.add("hidden");
            errorEl.classList.add("hidden");
            try {
                const standings = await getDriverStandings(year);
                renderStandings(standings);
            } catch (err) {
                loadingEl.classList.add("hidden");
                errorEl.textContent = "Could not load standings: " + err.message;
                errorEl.classList.remove("hidden");
            }
        }

        async function loadSeasons() {
            try {
                const seasons = await getSeasons();
                yearSelect.innerHTML = seasons.map(y => `<option value="${y}">${y}</option>`).join("");
                const saved = sessionStorage.getItem("selectedYear");
                if (saved) yearSelect.value = saved;
                loadStandings(yearSelect.value);
            } catch (err) {
                errorEl.textContent = "Could not load seasons: " + err.message;
                errorEl.classList.remove("hidden");
                loadingEl.classList.add("hidden");
            }
        }

        function goToDriver(driverId) {
            sessionStorage.setItem("selectedDriver", driverId);
            window.location.href = "driver_detail.html";
        }

        yearSelect.addEventListener("change", () => {
            sessionStorage.setItem("selectedYear", yearSelect.value);
            loadStandings(yearSelect.value);
        });

        loadSeasons();
    </script>
</body>
</html>
