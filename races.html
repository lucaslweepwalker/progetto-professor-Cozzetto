<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Stats · Races</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Orbitron', sans-serif; }
        .nav-link { color: #aaaaaa; letter-spacing: 0.1em; font-size: 0.75rem; transition: color 0.2s; }
        .nav-link:hover { color: #e74c3c; }
        .nav-link.active { color: #e74c3c; }
        .race-card { background-color: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 0.75rem; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.15s, background-color 0.15s; gap: 1rem; }
        .race-card:hover { border-color: #c0392b; background-color: #1f1f1f; }
        .round-badge { min-width: 36px; height: 36px; border-radius: 50%; background-color: #2a2a2a; border: 1px solid #3a3a3a; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #aaaaaa; flex-shrink: 0; }
        .circuit-svg { height: 48px; width: auto; object-fit: contain; flex-shrink: 0; opacity: 0.8; display: block; }
        .year-select { background-color: #111111; border: 1px solid #c0392b; color: #f0f0f0; border-radius: 0.5rem; padding: 0.4rem 0.8rem; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; }
        .year-select:focus { outline: none; }
        select option { background-color: #1c1c1c; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: #111111; color: #f0f0f0;">

    <nav style="background-color: #1a1a1a; border-bottom: 1px solid #c0392b;" class="px-8 py-4 flex items-center justify-between">
        <a href="index.html" class="text-lg font-black tracking-widest uppercase" style="color: #f0f0f0;">F1 Stats</a>
        <div class="flex gap-8">
            <a href="drivers.html" class="nav-link uppercase">Drivers</a>
            <a href="constructors.html" class="nav-link uppercase">Constructors</a>
            <a href="races.html" class="nav-link active uppercase">Races</a>
        </div>
    </nav>

    <div class="px-8 py-8" style="border-bottom: 1px solid #222222;">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <p class="text-xs uppercase tracking-widest mb-1" style="color: #c0392b;">Calendar</p>
                <h1 class="text-2xl font-black uppercase tracking-widest">Race Results</h1>
            </div>
            <select id="yearSelect" class="year-select"></select>
        </div>
    </div>

    <main class="flex-1 px-8 py-8">
        <div class="max-w-5xl mx-auto">
            <p id="loading" class="text-sm text-center py-16" style="color: #555555;">Loading races...</p>
            <p id="error" class="text-red-500 text-xs text-center py-8 hidden"></p>
            <p id="summary" class="text-xs mb-6 hidden" style="color: #555555;"></p>
            <div id="raceGrid" class="hidden flex flex-col gap-3"></div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs" style="color: #444444; border-top: 1px solid #222222;">
        Data provided by Jolpica · F1 Stats Project
    </footer>

    <script src="api.js"></script>
    <script>
        const yearSelect = document.getElementById("yearSelect");
        const raceGrid = document.getElementById("raceGrid");
        const loadingEl = document.getElementById("loading");
        const errorEl = document.getElementById("error");
        const summaryEl = document.getElementById("summary");

        function formatDate(dateStr) {
            if (!dateStr) return "—";
            const d = new Date(dateStr);
            return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
        }

        async function renderRaces(races, year) {
            summaryEl.textContent = `${races.length} races in the ${year} season`;
            summaryEl.classList.remove("hidden");

            // Render cards immediately
            raceGrid.innerHTML = races.map(r => `
                <div class="race-card" onclick="goToRace(${r.round})" style="position:relative;">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="round-badge">R${r.round}</div>
                        <div class="min-w-0">
                            <p class="font-bold text-sm uppercase tracking-wide truncate" style="color: #f0f0f0;">${r.race_name}</p>
                            <p class="text-xs mt-0.5 truncate" style="color: #777777;">
                                ${r.circuit_name} · <span style="color: #c0392b;">${r.country}</span>
                            </p>
                        </div>
                    </div>
                    <!-- Circuit SVG — positioned at 4/7ths from the left of the card -->
                    <div id="circuit-svg-${r.round}" style="position:absolute;left:57.14%;top:50%;transform:translate(-50%,-50%);height:48px;display:flex;align-items:center;pointer-events:none;"></div>
                    <div class="flex items-center gap-4 flex-shrink-0">
                        <div class="text-right">
                            <p class="text-xs" style="color: #555555;">Date</p>
                            <p class="text-xs font-semibold mt-0.5" style="color: #aaaaaa;">${formatDate(r.date)}</p>
                        </div>
                        <span style="color: #c0392b;">→</span>
                    </div>
                </div>
            `).join("");

            loadingEl.classList.add("hidden");
            raceGrid.classList.remove("hidden");

            // Load circuit SVGs asynchronously
            races.forEach(async r => {
                if (!r.circuit_id) return;
                const url = await getCircuitImageUrl(r.circuit_id, year, r.round);
                if (!url) return;
                const el = document.getElementById(`circuit-svg-${r.round}`);
                if (el) el.innerHTML = `<img class="circuit-svg" src="${url}" alt="${r.circuit_name}" />`;
            });
        }

        async function loadRaces(year) {
            loadingEl.classList.remove("hidden");
            raceGrid.classList.add("hidden");
            summaryEl.classList.add("hidden");
            errorEl.classList.add("hidden");
            try {
                const races = await getRaces(year);
                if (!races || races.length === 0) throw new Error(`No races found for ${year}`);
                await renderRaces(races, year);
            } catch (err) {
                loadingEl.classList.add("hidden");
                errorEl.textContent = "Could not load races: " + err.message;
                errorEl.classList.remove("hidden");
            }
        }

        async function loadSeasons() {
            try {
                const seasons = await getSeasons();
                yearSelect.innerHTML = seasons.map(y => `<option value="${y}">${y}</option>`).join("");
                const saved = sessionStorage.getItem("selectedYear");
                if (saved) yearSelect.value = saved;
                loadRaces(yearSelect.value);
            } catch (err) {
                errorEl.textContent = "Could not load seasons: " + err.message;
                errorEl.classList.remove("hidden");
                loadingEl.classList.add("hidden");
            }
        }

        function goToRace(round) {
            sessionStorage.setItem("selectedRound", round);
            window.location.href = "race_detail.html";
        }

        yearSelect.addEventListener("change", () => {
            sessionStorage.setItem("selectedYear", yearSelect.value);
            loadRaces(yearSelect.value);
        });

        loadSeasons();
    </script>
</body>
</html>
