<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Stats · Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Orbitron', sans-serif; }
        .nav-link { color: #aaaaaa; letter-spacing: 0.1em; font-size: 0.75rem; transition: color 0.2s; }
        .nav-link:hover { color: #e74c3c; }
        .back-btn { background-color: #1a1a1a; border: 1px solid #2a2a2a; color: #aaaaaa; font-size: 0.7rem; padding: 0.4rem 0.9rem; border-radius: 0.5rem; transition: border-color 0.2s, color 0.2s; cursor: pointer; font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }
        .back-btn:hover { border-color: #c0392b; color: #f0f0f0; }
        .driver-card { background-color: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 0.75rem; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; transition: border-color 0.2s; cursor: pointer; }
        .driver-card:hover { border-color: #c0392b; }
        .stat-pill { background-color: #111111; border: 1px solid #2a2a2a; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.65rem; color: #aaaaaa; font-weight: 600; letter-spacing: 0.05em; }
        .position-badge { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: #111111; color: #f0f0f0;">

    <nav style="background-color: #1a1a1a; border-bottom: 1px solid #c0392b;" class="px-8 py-4 flex items-center justify-between">
        <a href="index.html" class="text-lg font-black tracking-widest uppercase" style="color: #f0f0f0;">F1 Stats</a>
        <div class="flex gap-8">
            <a href="drivers.html" class="nav-link uppercase">Drivers</a>
            <a href="constructors.html" class="nav-link uppercase">Constructors</a>
            <a href="races.html" class="nav-link uppercase">Races</a>
        </div>
    </nav>

    <main class="flex-1 px-8 py-8">
        <div class="max-w-4xl mx-auto">
            <button class="back-btn mb-8" onclick="history.back()">← Back</button>
            <p id="loading" class="text-sm text-center py-16" style="color: #555555;">Loading team...</p>
            <p id="error" class="text-red-500 text-xs text-center py-8 hidden"></p>

            <div id="teamContent" class="hidden">

                <!-- Team header -->
                <div class="mb-8">
                    <p class="text-xs uppercase tracking-widest mb-1" style="color: #c0392b;">Constructor</p>
                    <div class="flex items-center justify-between">
                        <h1 id="teamName" class="text-3xl font-black uppercase tracking-widest" style="color: #f0f0f0;"></h1>
                        <div class="flex items-center gap-3">
                            <span id="teamNationality" class="text-xs uppercase tracking-widest" style="color: #777777;"></span>
                            <span id="teamYear" class="text-xs uppercase tracking-widest" style="color: #c0392b;"></span>
                        </div>
                    </div>
                    <div style="height: 1px; background-color: #c0392b; margin-top: 1rem;"></div>
                </div>

                <!-- Constructor stats -->
                <div id="constructorStats" class="rounded-xl p-6 mb-8" style="background-color: #1a1a1a; border: 1px solid #2a2a2a;">
                    <p class="text-xs uppercase tracking-widest mb-4" style="color: #777777;">Season Stats</p>
                    <div class="grid grid-cols-3 gap-6 text-center">
                        <div>
                            <p class="text-xs uppercase tracking-widest mb-1" style="color: #555555;">Position</p>
                            <p id="constructorPosition" class="text-2xl font-black" style="color: #f0f0f0;"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-widest mb-1" style="color: #555555;">Points</p>
                            <p id="constructorPoints" class="text-2xl font-black" style="color: #f0f0f0;"></p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-widest mb-1" style="color: #555555;">Wins</p>
                            <p id="constructorWins" class="text-2xl font-black" style="color: #f0f0f0;"></p>
                        </div>
                    </div>
                </div>

                <!-- Driver cards -->
                <div>
                    <p class="text-xs uppercase tracking-widest mb-4" style="color: #777777;">Drivers</p>
                    <div id="driverCards" class="grid grid-cols-2 gap-6"></div>
                </div>

            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs" style="color: #444444; border-top: 1px solid #222222;">
        Data provided by Jolpica · F1 Stats Project
    </footer>

    <script src="api.js"></script>
    <script>
        const loadingEl = document.getElementById("loading");
        const errorEl = document.getElementById("error");
        const teamContent = document.getElementById("teamContent");

        function badgeStyle(pos) {
            if (pos === 1) return "background-color: #f1c40f; color: #111111;";
            if (pos === 2) return "background-color: #bdc3c7; color: #111111;";
            if (pos === 3) return "background-color: #cd7f32; color: #111111;";
            return "background-color: #2a2a2a; color: #aaaaaa;";
        }

        function goToDriver(driverId) {
            sessionStorage.setItem("selectedDriver", driverId);
            window.location.href = "driver_detail.html";
        }

        function renderDriverCards(drivers) {
            const container = document.getElementById("driverCards");
            if (!drivers || drivers.length === 0) {
                container.innerHTML = `<p class="text-xs col-span-2 text-center py-8" style="color: #555555;">No driver data available for this team.</p>`;
                return;
            }

            container.innerHTML = drivers.map(d => `
                <div class="driver-card" onclick="goToDriver('${d.driver.driver_id}')">
                    <div class="text-center">
                        <p class="text-xs font-semibold uppercase tracking-widest mb-0.5" style="color: #aaaaaa;">${d.driver.first_name}</p>
                        <p class="text-xl font-black uppercase tracking-widest" style="color: #f0f0f0;">${d.driver.last_name}</p>
                        <p class="text-xs mt-1" style="color: #555555;">
                            ${d.driver.nationality}${d.driver.number ? ` · #${d.driver.number}` : ""}
                        </p>
                    </div>
                    <div class="flex gap-2 flex-wrap justify-center">
                        <span class="stat-pill">${d.points} pts</span>
                        <span class="stat-pill">${d.wins} wins</span>
                        <span class="position-badge stat-pill" style="${badgeStyle(d.position)}">P${d.position}</span>
                    </div>
                </div>
            `).join("");
        }

        async function loadTeam() {
            const year = sessionStorage.getItem("selectedYear");
            const constructorId = sessionStorage.getItem("selectedConstructor");

            if (!year || !constructorId) {
                loadingEl.classList.add("hidden");
                errorEl.textContent = "No team selected. Go back and click a constructor.";
                errorEl.classList.remove("hidden");
                return;
            }

            try {
                // Run both requests in parallel
                const [standings, drivers] = await Promise.all([
                    getConstructorStandings(year),
                    getTeamDrivers(year, constructorId)
                ]);

                const teamStanding = standings.find(s => s.constructor.constructor_id === constructorId);
                const teamName = teamStanding ? teamStanding.constructor.name : constructorId.replace(/_/g, " ").toUpperCase();

                document.getElementById("teamName").textContent = teamName;
                document.getElementById("teamNationality").textContent = teamStanding?.constructor.nationality ?? "";
                document.getElementById("teamYear").textContent = year;
                document.title = `F1 Stats · ${teamName}`;

                if (teamStanding) {
                    const pos = standings.indexOf(teamStanding) + 1;
                    document.getElementById("constructorPosition").textContent = `P${pos}`;
                    document.getElementById("constructorPoints").textContent = teamStanding.points;
                    document.getElementById("constructorWins").textContent = teamStanding.wins;
                } else {
                    document.getElementById("constructorStats").classList.add("hidden");
                }

                renderDriverCards(drivers);

                loadingEl.classList.add("hidden");
                teamContent.classList.remove("hidden");

            } catch (err) {
                loadingEl.classList.add("hidden");
                errorEl.textContent = "Could not load team: " + err.message;
                errorEl.classList.remove("hidden");
            }
        }

        loadTeam();
    </script>
</body>
</html>
